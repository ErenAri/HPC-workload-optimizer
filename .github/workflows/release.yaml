name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  production-readiness-gate:
    name: Production readiness gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify package/changelog/tag version consistency
        run: python scripts/verify_version_consistency.py --tag-ref "${{ github.ref_name }}" --check-unreleased-link
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Build release evidence bundle
        run: |
          mkdir -p outputs/release-evidence
          python scripts/check_openapi_compat.py --baseline schemas/openapi_baseline.json | tee outputs/release-evidence/openapi-compat.txt
          python scripts/production_readiness_gate.py --mode release | tee outputs/release-evidence/production-readiness.txt
      - name: Validate release evidence artifacts exist
        run: test -f outputs/release-evidence/production-readiness.txt
      - name: Upload release evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: outputs/release-evidence/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: production-readiness-gate
    # One-time setup: add a "trusted publisher" for this repo on
    # https://pypi.org/manage/account/publishing/ (project
    # hpc-workload-optimizer, workflow release.yaml, environment pypi).
    # Until that exists this job fails without blocking the other jobs.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  security-container-scan:
    name: Container vulnerability scan
    runs-on: ubuntu-latest
    needs: production-readiness-gate
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs:
      - production-readiness-gate
      - security-container-scan
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  changelog:
    name: Generate changelog & GitHub release
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Determine the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          # Write to file for the release body
          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/changelog.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
