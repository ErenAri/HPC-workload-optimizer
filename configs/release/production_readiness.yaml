metadata:
  release_target: "v2.4.0"
  reviewed_at_utc: "2026-07-08T00:00:00Z"
  owner: "platform-team"
  notes: "Checklist-driven release readiness. Re-reviewed for v2.4.0: all evidence paths verified present; GitHub Actions re-enabled after being disabled since Feb 2026."

checks:
  - id: correctness_gates
    title: "Lint, type-check, and tests are green in CI"
    required: true
    status: done
    evidence: "CI workflows: ruff, mypy, pytest matrix"

  - id: benchmark_regression
    title: "Benchmark regression gate passed on representative workload"
    required: true
    status: done
    evidence: "scripts/verify.ps1 efficiency gate"

  - id: api_load_slo
    title: "API load tests pass and SLO thresholds are met"
    required: true
    status: done
    evidence: "tests/load/test_api_load.py"

  - id: fidelity_and_recommendation
    title: "Fidelity and recommendation gate executed on target dataset"
    required: true
    status: done
    evidence: "scripts/verify.ps1 -StrictQuality and .github/workflows/staging-verify.yml"
    note: "Strict quality mode enforces fidelity=pass and recommendation=accepted."

  - id: observability_runbooks
    title: "SLOs, alerts, dashboards, and incident runbooks are complete"
    required: true
    status: done
    evidence: "docs/ops/slo-and-error-budget.md, docs/runbooks/*, configs/monitoring/alerts/hpcopt_alert_rules.yaml"
    note: "Operational playbooks and Prometheus alert rules are versioned in repo."

  - id: security_controls
    title: "Security scan and secret management checks are complete"
    required: true
    status: done
    evidence: ".github/workflows/ci.yaml security jobs, .github/workflows/release.yaml container scan, docs/security/*"
    note: "Dependency audit, secret scan, and release-time vulnerability scan are automated."

  - id: deployment_safety
    title: "Canary/rollback strategy validated in staging"
    required: true
    status: done
    evidence: "docs/ops/deployment-safety.md, docs/runbooks/release-rollback.md, .github/workflows/staging-verify.yml"
    note: "Staged verification workflow and rollback runbook provide release guardrails."

  - id: model_ops
    title: "Drift monitoring and retraining trigger policy validated"
    required: true
    status: done
    evidence: "docs/mlops/model-lifecycle.md, docs/ops/model-acceptance.md, scripts/run_drift_monitor.py, .github/workflows/ops-drill.yml"
    note: "Scheduled drift monitor workflow and lifecycle policy are in place."

  - id: disaster_recovery
    title: "Backup and restore drill completed"
    required: true
    status: done
    evidence: "docs/ops/disaster-recovery.md, scripts/dr_backup_restore_drill.py, .github/workflows/ops-drill.yml"
    note: "Automated local backup/restore drill script and recurring drill workflow added."

  - id: api_compatibility
    title: "External API versioning and compatibility policy documented"
    required: true
    status: done
    evidence: "docs/api/versioning-and-deprecation.md, scripts/check_openapi_compat.py, schemas/openapi_baseline.json, CI openapi-compat job"
    note: "Backward compatibility is enforced through OpenAPI baseline comparison and contract tests."
